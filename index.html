<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Калькулятор</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c141c;
        --bg-grid: #281c28;
        --panel: #302038;
        --panel-border-light: #e0d0ff;
        --panel-border-dark: #000000;
        --key-face: #f5f5dc;
        --key-face-op: #f8d090;
        --key-face-eq: #90f8b0;
        --key-face-danger: #f89090;
        --key-border-dark: #000000;
        --key-border-light: #ffffff;
        --text-main: #000000;
        --text-screen: #78ff7c;
        --text-muted: #b0a0d0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 16px;
        background-color: var(--bg);
        color: var(--text-screen);
        font-family: "Courier New", Courier, monospace;
        image-rendering: pixelated;
        position: relative;
        overflow: hidden;
        cursor: crosshair;
      }

      body.theme-light {
        --bg: #f4f4f4;
        --panel: #f0e4ff;
        --panel-border-light: #ffffff;
        --panel-border-dark: #000000;
        --key-face: #ffffff;
        --key-face-op: #ffe4a0;
        --key-face-eq: #a0ffd0;
        --key-face-danger: #ffb0b0;
        --text-main: #000000;
        --text-screen: #004020;
        --text-muted: #555555;
      }

      .ui-layer {
        position: relative;
        z-index: 2;
      }

      .matrix-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: radial-gradient(circle at top, #001000 0, #000000 60%);
      }

      body.theme-light .matrix-canvas {
        background: radial-gradient(circle at top, #f4fff4 0, #e4f0e4 60%);
      }

      .matrix-fade {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0) 55%,
          rgba(0, 0, 0, 0.85) 100%
        );
        mix-blend-mode: multiply;
      }

      .calc {
        width: min(360px, 100%);
        background: var(--panel);
        border-radius: 0;
        border: 4px solid var(--panel-border-dark);
        box-shadow:
          0 0 0 4px var(--panel-border-light),
          0 0 0 6px var(--panel-border-dark),
          0 8px 0 0 #000000;
        overflow: hidden;
      }

      .header {
        padding: 6px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border-bottom: 4px solid var(--panel-border-dark);
        background: #201028;
      }

      .title {
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #ffffff;
      }

      .hint {
        font-size: 8px;
        color: var(--text-muted);
        white-space: nowrap;
        text-transform: uppercase;
      }

      .display {
        padding: 8px;
        background: #100810;
        border-bottom: 4px solid var(--panel-border-dark);
      }

      #display {
        width: 100%;
        min-height: 48px;
        padding: 6px 6px;
        border-radius: 0;
        background: #001808;
        border-top: 4px solid #60ff80;
        border-left: 4px solid #60ff80;
        border-right: 4px solid #003018;
        border-bottom: 4px solid #003018;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        font-variant-numeric: tabular-nums;
        font-size: 18px;
        line-height: 1.1;
        overflow: hidden;
        word-break: break-all;
        color: var(--text-screen);
        text-shadow:
          0 0 2px #60ff80,
          0 0 4px #60ff80;
      }

      .subline {
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        color: var(--text-muted);
        font-size: 8px;
        text-transform: uppercase;
      }

      #expr {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 75%;
      }

      .keys {
        padding: 8px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        background: #201028;
      }

      button.key {
        appearance: none;
        border-radius: 0;
        border-top: 4px solid var(--key-border-light);
        border-left: 4px solid var(--key-border-light);
        border-right: 4px solid var(--key-border-dark);
        border-bottom: 4px solid var(--key-border-dark);
        background: var(--key-face);
        color: var(--text-main);
        padding: 10px 4px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        text-transform: uppercase;
        box-shadow: 0 3px 0 0 #000000;
      }

      button.key:active {
        border-top: 4px solid var(--key-border-dark);
        border-left: 4px solid var(--key-border-dark);
        border-right: 4px solid var(--key-border-light);
        border-bottom: 4px solid var(--key-border-light);
        box-shadow: 0 0 0 0 #000000;
        transform: translateY(2px);
      }

      button.key:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 0;
      }

      button.op {
        background: var(--key-face-op);
      }

      button.eq {
        background: var(--key-face-eq);
      }

      button.clear {
        background: var(--key-face-danger);
      }

      button.span2 {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <canvas
      id="matrix-canvas"
      class="matrix-canvas"
      aria-hidden="true"
    ></canvas>
    <div class="matrix-fade" aria-hidden="true"></div>

    <div class="ui-layer">
      <main class="calc" aria-label="Калькулятор">
        <div class="header">
          <div class="title">Калькулятор</div>
          <div class="hint">Клики мышью или клавиатура</div>
        </div>

        <section class="display" aria-label="Дисплей">
          <div id="display" role="status" aria-live="polite">0</div>
          <div class="subline">
            <div id="expr" aria-label="Выражение"></div>
            <div id="status" aria-label="Статус"></div>
          </div>
        </section>

        <section class="keys" aria-label="Кнопки">
          <button class="key clear" data-action="clear" type="button">C</button>
          <button class="key op" data-action="toggle-angle" type="button">RAD</button>
          <button class="key op" data-action="toggle-theme" type="button">L/D</button>
          <button class="key op" data-action="sqrt" type="button">√</button>
          <button class="key op" data-op="/" type="button">/</button>
          <button class="key op" data-op="*" type="button">*</button>
          <button class="key op" data-op="-" type="button">-</button>

          <button class="key op" data-action="const-pi" type="button">π</button>
          <button class="key op" data-action="const-e" type="button">e</button>
          <button class="key" data-digit="7" type="button">7</button>
          <button class="key" data-digit="8" type="button">8</button>
          <button class="key" data-digit="9" type="button">9</button>
          <button class="key op" data-op="+" type="button">+</button>

          <button class="key op" data-action="sin" type="button">sin</button>
          <button class="key op" data-action="cos" type="button">cos</button>
          <button class="key op" data-action="tan" type="button">tan</button>
          <button class="key" data-digit="4" type="button">4</button>
          <button class="key" data-digit="5" type="button">5</button>
          <button class="key" data-digit="6" type="button">6</button>
          <button class="key eq" data-action="equals" type="button">=</button>

          <button class="key" data-digit="1" type="button">1</button>
          <button class="key" data-digit="2" type="button">2</button>
          <button class="key" data-digit="3" type="button">3</button>
          <button class="key span2" data-digit="0" type="button">0</button>
          <button class="key op" data-action="rick" type="button">rick</button>
          <button class="key op" data-action="toggle-dino" type="button">🦖</button>
        </section>
      </main>
    </div>

    <script>
      // Matrix-style falling code background
      (function () {
        const canvas = document.getElementById("matrix-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const chars =
          "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        let width = window.innerWidth;
        let height = window.innerHeight;
        const fontSize = 16;
        let columns = Math.floor(width / fontSize);
        let drops = new Array(columns).fill(0);

        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          columns = Math.floor(width / fontSize);
          drops = new Array(columns).fill(0);
        }

        function draw() {
          const isLight = document.body.classList.contains("theme-light");
          const trail = isLight ? "rgba(255, 255, 255, 0.15)" : "rgba(0, 0, 0, 0.15)";
          const symbolColor = isLight ? "#ffffff" : "#60ff80";

          ctx.fillStyle = trail;
          ctx.fillRect(0, 0, width, height);

          ctx.fillStyle = symbolColor;
          ctx.font = fontSize + 'px "Courier New", monospace';

          for (let i = 0; i < columns; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            const x = i * fontSize;
            const y = drops[i] * fontSize;
            ctx.fillText(text, x, y);

            if (y > height && Math.random() > 0.975) {
              drops[i] = 0;
            } else {
              drops[i]++;
            }
          }

          requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        requestAnimationFrame(draw);
      })();

      // Calculator logic
      (function () {
        const displayEl = document.getElementById("display");
        const exprEl = document.getElementById("expr");
        const statusEl = document.getElementById("status");
        const keysRoot = document.querySelector(".keys");
        const bodyEl = document.body;

        const isOp = (v) => v === "+" || v === "-" || v === "*" || v === "/";
        const toNumber = (s) => Number(s);

        const state = {
          left: null,
          op: null,
          input: "0",
          justEvaluated: false,
          error: null,
          angleMode: "RAD",
        };

        let dinoActive = false;
        let dinoCanvas = null;
        let dinoCtx = null;
        let dinoAnimId = null;
        let dinoState = null;

        function setStatus(text) {
          statusEl.textContent = text || "";
        }

        function setError(message) {
          state.error = message || "Ошибка";
          displayEl.textContent = "Ошибка";
          setStatus(state.error);
        }

        function clearAll() {
          state.left = null;
          state.op = null;
          state.input = "0";
          state.justEvaluated = false;
          state.error = null;
          render();
        }

        function render() {
          if (dinoActive) {
            setStatus(state.angleMode + " | GAME");
            return;
          }
          if (state.error) {
            displayEl.textContent = "Ошибка";
            exprEl.textContent = "";
            setStatus(state.error);
            return;
          }

          displayEl.textContent = state.input;
          const exprParts = [];
          if (state.left !== null) exprParts.push(String(state.left));
          if (state.op) exprParts.push(state.op);
          exprEl.textContent = exprParts.join(" ");
          setStatus(state.angleMode);
        }

        function initDinoCanvas() {
          if (dinoCanvas) return;
          dinoCanvas = document.createElement("canvas");
          dinoCanvas.setAttribute("aria-label", "Игра динозавр");
          dinoCanvas.style.width = "100%";
          dinoCanvas.style.height = "100%";
          dinoCtx = dinoCanvas.getContext("2d");
        }

        function startDinoGame() {
          if (dinoActive) return;
          dinoActive = true;
          if (!dinoCanvas) initDinoCanvas();

          displayEl.textContent = "";
          if (!displayEl.contains(dinoCanvas)) {
            displayEl.appendChild(dinoCanvas);
          }

          const rect = displayEl.getBoundingClientRect();
          const w = (dinoCanvas.width = Math.max(260, Math.floor(rect.width)));
          const h = (dinoCanvas.height = Math.max(60, Math.floor(rect.height)));

          const groundY = h - 10;

          dinoState = {
            dinoX: 24,
            dinoY: groundY - 18,
            dinoW: 16,
            dinoH: 18,
            vy: 0,
            gravity: 0.5,
            jumpStrength: -9,
            groundY,
            obstacles: [],
            speed: 4,
            score: 0,
            lastSpawn: 0,
            lastTime: 0,
          };

          function loop(timestamp) {
            if (!dinoActive || !dinoCtx) return;

            if (!dinoState.lastTime) dinoState.lastTime = timestamp;
            const dt = Math.min(40, timestamp - dinoState.lastTime);
            dinoState.lastTime = timestamp;

            const isLight = bodyEl.classList.contains("theme-light");
            const bg = isLight ? "#f4fff4" : "#001000";
            const groundColor = isLight ? "#c0d0c0" : "#0aff40";
            const dinoColor = isLight ? "#202020" : "#ffffff";
            const cactusColor = isLight ? "#206020" : "#00ff66";
            const scoreColor = isLight ? "#202020" : "#ffffff";

            dinoCtx.fillStyle = bg;
            dinoCtx.fillRect(0, 0, w, h);

            dinoCtx.fillStyle = groundColor;
            dinoCtx.fillRect(0, dinoState.groundY, w, 2);

            dinoState.vy += dinoState.gravity * (dt / 16);
            dinoState.dinoY += dinoState.vy;
            if (dinoState.dinoY >= dinoState.groundY - dinoState.dinoH) {
              dinoState.dinoY = dinoState.groundY - dinoState.dinoH;
              dinoState.vy = 0;
            }

            dinoState.lastSpawn += dt;
            if (dinoState.lastSpawn > 900 + Math.random() * 700) {
              dinoState.obstacles.push({
                x: w + 10,
                y: dinoState.groundY - 16,
                w: 10,
                h: 16,
              });
              dinoState.lastSpawn = 0;
            }

            const dx = dinoState.speed * (dt / 16);
            dinoState.obstacles.forEach((o) => {
              o.x -= dx;
            });
            dinoState.obstacles = dinoState.obstacles.filter((o) => o.x + o.w > 0);

            dinoState.obstacles.forEach((o) => {
              const collide =
                dinoState.dinoX < o.x + o.w &&
                dinoState.dinoX + dinoState.dinoW > o.x &&
                dinoState.dinoY < o.y + o.h &&
                dinoState.dinoY + dinoState.dinoH > o.y;
              if (collide) {
                dinoState.obstacles = [];
                dinoState.score = 0;
                dinoState.dinoY = dinoState.groundY - dinoState.dinoH;
                dinoState.vy = 0;
              }
            });

            dinoState.score += dt * 0.01;

            dinoCtx.fillStyle = cactusColor;
            dinoState.obstacles.forEach((o) => {
              dinoCtx.fillRect(o.x, o.y, o.w, o.h);
              dinoCtx.fillRect(o.x + 2, o.y - 6, 6, 6);
            });

            dinoCtx.fillStyle = dinoColor;
            dinoCtx.fillRect(
              dinoState.dinoX,
              dinoState.dinoY,
              dinoState.dinoW,
              dinoState.dinoH
            );
            dinoCtx.fillRect(
              dinoState.dinoX,
              dinoState.dinoY - 6,
              Math.floor(dinoState.dinoW * 0.7),
              6
            );

            dinoCtx.fillStyle = scoreColor;
            dinoCtx.font = "10px 'Courier New', monospace";
            dinoCtx.fillText("SCORE " + Math.floor(dinoState.score), 8, 14);

            dinoAnimId = requestAnimationFrame(loop);
          }

          dinoAnimId = requestAnimationFrame(loop);
          setStatus(state.angleMode + " | GAME");
        }

        function stopDinoGame() {
          if (!dinoActive) return;
          dinoActive = false;
          if (dinoAnimId) {
            cancelAnimationFrame(dinoAnimId);
            dinoAnimId = null;
          }
          if (dinoCanvas && displayEl.contains(dinoCanvas)) {
            displayEl.removeChild(dinoCanvas);
          }
          dinoState = null;
          displayEl.textContent = state.input;
          render();
        }

        function toggleDinoGame() {
          if (dinoActive) stopDinoGame();
          else startDinoGame();
        }

        function dinoJump() {
          if (!dinoActive || !dinoState) return;
          const onGround =
            dinoState.dinoY >= dinoState.groundY - dinoState.dinoH - 0.5;
          if (onGround) {
            dinoState.vy = dinoState.jumpStrength;
          }
        }

        function appendDigit(d) {
          if (state.error) clearAll();

          if (state.justEvaluated && !state.op) {
            state.input = "0";
            state.left = null;
            state.justEvaluated = false;
          }

          if (state.input === "0") state.input = d;
          else state.input += d;
          render();
        }

        function compute(a, op, b) {
          if (op === "+") return a + b;
          if (op === "-") return a - b;
          if (op === "*") return a * b;
          if (op === "/") {
            if (b === 0) return null;
            return a / b;
          }
          return null;
        }

        function sqrtCurrent() {
          if (state.error) clearAll();

          const current = toNumber(state.input);
          if (!Number.isFinite(current)) {
            setError("Некорректное число");
            return;
          }
          if (current < 0) {
            setError("Корень из отрицательного");
            return;
          }

          const result = Math.sqrt(current);
          if (!Number.isFinite(result)) {
            setError("Ошибка вычисления");
            return;
          }

          state.input = String(result);
          state.justEvaluated = false;
          render();
        }

        function setInputValue(value) {
          if (!Number.isFinite(value)) {
            setError("Ошибка вычисления");
            return;
          }
          state.error = null;
          state.input = String(value);
          state.justEvaluated = false;
          render();
        }

        function toRadians(x) {
          return state.angleMode === "DEG" ? (x * Math.PI) / 180 : x;
        }

        function trig(fnName) {
          if (state.error) clearAll();

          const current = toNumber(state.input);
          if (!Number.isFinite(current)) {
            setError("Некорректное число");
            return;
          }

          const r = toRadians(current);
          let result = null;
          if (fnName === "sin") result = Math.sin(r);
          else if (fnName === "cos") result = Math.cos(r);
          else if (fnName === "tan") result = Math.tan(r);

          if (result === null || !Number.isFinite(result)) {
            setError("Ошибка вычисления");
            return;
          }

          setInputValue(result);
        }

        function toggleAngleMode() {
          state.angleMode = state.angleMode === "RAD" ? "DEG" : "RAD";
          render();
        }

        function chooseOp(nextOp) {
          if (state.error) clearAll();

          const current = toNumber(state.input);
          if (!Number.isFinite(current)) {
            setError("Некорректное число");
            return;
          }

          if (state.left === null) {
            state.left = current;
            state.op = nextOp;
            state.input = "0";
            state.justEvaluated = false;
            render();
            return;
          }

          if (state.op) {
            const result = compute(state.left, state.op, current);
            if (result === null || !Number.isFinite(result)) {
              setError(state.op === "/" ? "Деление на 0" : "Ошибка вычисления");
              return;
            }
            state.left = result;
            state.op = nextOp;
            state.input = "0";
            state.justEvaluated = false;
            render();
            return;
          }

          state.op = nextOp;
          state.input = "0";
          state.justEvaluated = false;
          render();
        }

        function equals() {
          if (state.error) {
            clearAll();
            return;
          }
          if (state.left === null || !state.op) return;

          const right = toNumber(state.input);
          if (!Number.isFinite(right)) {
            setError("Некорректное число");
            return;
          }

          const result = compute(state.left, state.op, right);
          if (result === null || !Number.isFinite(result)) {
            setError(state.op === "/" ? "Деление на 0" : "Ошибка вычисления");
            return;
          }

          state.left = null;
          state.op = null;
          state.input = String(result);
          state.justEvaluated = true;
          render();
        }

        keysRoot.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;

          const digit = btn.getAttribute("data-digit");
          const op = btn.getAttribute("data-op");
          const action = btn.getAttribute("data-action");

          if (digit !== null) appendDigit(digit);
          else if (op) chooseOp(op);
          else if (action === "equals") equals();
          else if (action === "clear") clearAll();
          else if (action === "sqrt") sqrtCurrent();
          else if (action === "const-pi") setInputValue(Math.PI);
          else if (action === "const-e") setInputValue(Math.E);
          else if (action === "sin") trig("sin");
          else if (action === "cos") trig("cos");
          else if (action === "tan") trig("tan");
          else if (action === "toggle-angle") toggleAngleMode();
          else if (action === "rick")
            window.open(
              "https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1",
              "_blank"
            );
          else if (action === "toggle-theme") {
            bodyEl.classList.toggle("theme-light");
          } else if (action === "toggle-dino") {
            toggleDinoGame();
          }
        });

        window.addEventListener("keydown", (e) => {
          const k = e.key;
          if (dinoActive && (k === " " || k === "ArrowUp" || k === "w" || k === "W")) {
            e.preventDefault();
            dinoJump();
            return;
          }
          if (k >= "0" && k <= "9") {
            e.preventDefault();
            appendDigit(k);
            return;
          }
          if (isOp(k)) {
            e.preventDefault();
            chooseOp(k);
            return;
          }
          if (k === "Enter" || k === "=") {
            e.preventDefault();
            equals();
            return;
          }
          if (k === "Escape" || k === "c" || k === "C") {
            e.preventDefault();
            clearAll();
            return;
          }
          if (k === "r" || k === "R" || k === "√") {
            e.preventDefault();
            sqrtCurrent();
            return;
          }
          if (k === "p" || k === "P") {
            e.preventDefault();
            setInputValue(Math.PI);
            return;
          }
          if (k === "e") {
            e.preventDefault();
            setInputValue(Math.E);
            return;
          }
          if (k === "s" || k === "S") {
            e.preventDefault();
            trig("sin");
            return;
          }
          if (k === "o" || k === "O") {
            e.preventDefault();
            trig("cos");
            return;
          }
          if (k === "t" || k === "T") {
            e.preventDefault();
            trig("tan");
            return;
          }
          if (k === "d" || k === "D") {
            e.preventDefault();
            toggleAngleMode();
          }
        });

        clearAll();
      })();
    </script>
  </body>
